<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace | Alexandre Damasceno</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --gold: #bf953f;
            --gold-light: #fcf6ba;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; padding-bottom: 100px; }
        
        header { padding: 20px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .clock { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .slide { display: none; }
        .slide.active { display: block; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-decoration: none; color: white; text-align: center; }
        .card i { font-size: 1.5rem; color: var(--gold); margin-bottom: 10px; }

        .panel { background: var(--glass); border-radius: 15px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 100%); color: #000; }
        .btn:disabled { opacity: 0.5; }

        #preview-canvas { width: 100%; border-radius: 10px; background: #111; margin-top: 15px; border: 1px solid var(--border); }

        .dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(15,15,15,0.95); border: 1px solid var(--border); border-radius: 40px; display: flex; justify-content: space-around; padding: 10px; backdrop-filter: blur(10px); }
        .dock-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .dock-btn.active { color: var(--gold); }
        .dock-btn i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; letter-spacing: 1px;">ALEXANDRE DAMASCENO</div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <div class="container">
        <section id="slide-links" class="slide active">
            <div class="grid">
                <a href="https://wa.me/5521972653971" class="card"><i class="fab fa-whatsapp"></i><br>WhatsApp</a>
                <a href="https://www.instagram.com/alexandredamasceno.corretor" class="card"><i class="fab fa-instagram"></i><br>Instagram</a>
                <a href="https://chatgpt.com/" class="card"><i class="fas fa-robot"></i><br>ChatGPT</a>
            </div>
        </section>

        <section id="slide-estudio" class="slide">
            <div class="panel">
                <label>Foto do Imóvel</label>
                <input type="file" id="img-in" accept="image/*" onchange="window.loadImg()">
                <input type="text" id="tit" placeholder="TÍTULO (Ex: Cobertura Pura)" oninput="window.render()">
                <input type="text" id="val" placeholder="VALOR (Ex: R$ 1.500.000)" oninput="window.render()">
                <textarea id="des" placeholder="Descrição rápida..." oninput="window.render()"></textarea>
                <button class="btn" id="btn-save" onclick="window.save()">Baixar Arte e Salvar</button>
            </div>
            <canvas id="preview-canvas" width="1080" height="1350"></canvas>
        </section>
    </div>

    <nav class="dock">
        <button class="dock-btn active" onclick="window.tab('slide-links', this)"><i class="fas fa-link"></i>Links</button>
        <button class="dock-item" style="background:none; border:none; color:#666;" onclick="window.tab('slide-estudio', this)"><i class="fas fa-camera"></i>Estúdio</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

        // CONFIGURAÇÃO REAL EXTRAÍDA DA TUA FOTO
        const firebaseConfig = {
            apiKey: "AIzaSyCrF0p0v9ofISUWPnD-K8nhzXH30ENjuA",
            authDomain: "workspace-imobiliario.firebaseapp.com",
            projectId: "workspace-imobiliario",
            storageBucket: "workspace-imobiliario.appspot.com",
            messagingSenderId: "46767058778",
            appId: "1:46767058778:web:1522f9bc512320ce498d63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // RELÓGIO E TABS
        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR'); }, 1000);
        window.tab = (id, b) => {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // CANVAS
        const cv = document.getElementById('preview-canvas');
        const ctx = cv.getContext('2d');
        let base = new Image();

        window.loadImg = () => {
            const r = new FileReader();
            r.onload = (e) => { base.onload = window.render; base.src = e.target.result; };
            r.readAsDataURL(document.getElementById('img-in').files[0]);
        };

        window.render = () => {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,1080,1350);
            if(base.src) ctx.drawImage(base, 0, 0, 1080, 1350);
            
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 950, 1080, 400);
            ctx.fillStyle = "#fff"; ctx.font = "bold 60px sans-serif";
            ctx.fillText(document.getElementById('tit').value.toUpperCase() || "TÍTULO", 60, 1050);
            ctx.fillStyle = "#bf953f"; ctx.font = "50px sans-serif";
            ctx.fillText(document.getElementById('val').value || "R$ 0,00", 60, 1130);
            ctx.fillStyle = "#aaa"; ctx.font = "30px sans-serif";
            ctx.fillText("ALEXANDRE DAMASCENO | CRECI 106.899", 60, 1280);
        };

        window.save = async () => {
            const btn = document.getElementById('btn-save');
            btn.innerText = "⏳ A GERAR..."; btn.disabled = true;

            try {
                // 1. ENTREGA LOGO A FOTO (DOWNLOAD LOCAL)
                const link = document.createElement('a');
                link.download = "arte-imovel.png";
                link.href = cv.toDataURL("image/png");
                link.click();

                // 2. TENTA SALVAR NA NUVEM (SEM TRAVAR O ALEXANDRE)
                const blob = await new Promise(res => cv.toBlob(res, 'image/png'));
                const fileRef = ref(storage, `artes/${Date.now()}.png`);
                await uploadBytes(fileRef, blob);
                const url = await getDownloadURL(fileRef);

                await addDoc(collection(db, "historico_artes"), {
                    titulo: document.getElementById('tit').value,
                    url: url,
                    data: serverTimestamp()
                });

                btn.innerText = "✅ SUCESSO!";
            } catch (e) {
                console.error(e);
                btn.innerText = "⚠️ BAIXADO (ERRO NUVEM)";
            }
            
            setTimeout(() => { btn.innerText = "Baixar Arte e Salvar"; btn.disabled = false; }, 3000);
        };
    </script>
</body>
</html>
