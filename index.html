<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace | Alexandre Damasceno</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 100%);
            --text-main: #f8fafc;
            --gold-text: #e8c97a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Lato', sans-serif; overflow-x: hidden; min-height: 100vh; }

        .background-anim { position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: radial-gradient(circle at 15% 50%, rgba(201, 168, 76, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%); }
        .background-anim::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation: gridMove 20s linear infinite; }
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 1000; }
        .clock-widget { font-family: 'Poppins', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--gold-text); }
        .post-counter { font-size: 1rem; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
        .post-counter span { background: var(--gold-gradient); color: #000; padding: 2px 8px; border-radius: 12px; font-weight: bold; }

        .search-container { padding: 20px 30px 0; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }
        .search-bar { width: 100%; background: var(--glass-bg); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 15px 25px; color: white; font-size: 1.2rem; backdrop-filter: blur(10px); outline: none; transition: border-color 0.3s; }
        .search-bar:focus { border-color: var(--gold-text); }

        .main-content { max-width: 1200px; margin: 0 auto; padding: 30px; padding-bottom: 150px; position: relative; z-index: 10; }
        .slide { display: none; opacity: 0; transform: translateY(20px); }
        .slide.active { display: block; opacity: 1; transform: translateY(0); animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .section-header { margin-bottom: 25px; font-family: 'Poppins'; }
        .section-header h2 { font-size: 2rem; }
        .section-header p { color: #94a3b8; font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; text-decoration: none; display: flex; flex-direction: column; align-items: center; text-align: center; color: var(--text-main); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-8px); border-color: var(--gold-text); }
        .card-icon { width: 55px; height: 55px; margin-bottom: 15px; border-radius: 12px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .card-icon img { width: 35px; height: 35px; border-radius: 8px; }
        .card .title { font-size: 1.2rem; font-weight: 700; font-family: 'Poppins'; }
        .card .sub { font-size: 0.85rem; color: #94a3b8; margin-top: 5px; }

        .creator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 800px) { .creator-grid { grid-template-columns: 1fr; } }
        .panel { background: var(--glass-bg); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(15px); }
        textarea, input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; padding: 15px; font-size: 1.1rem; margin-top: 10px; }
        
        .btn-primary { width: 100%; background: var(--gold-gradient); color: #000; border: none; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: 800; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        #preview-canvas { width: 100%; max-width: 500px; height: auto; border-radius: 15px; border: 1px solid var(--glass-border); margin-top: 15px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.3); padding: 5px; border-radius: 40px; display: flex; z-index: 99999; width: 90%; max-width: 600px; justify-content: space-around; }
        .dock-item { background: transparent; border: none; color: #94a3b8; cursor: pointer; padding: 12px; display: flex; flex-direction: column; align-items: center; flex: 1; transition: 0.3s; }
        .dock-item.active { color: #c9a84c; }
        .dock-item i { font-size: 1.6rem; margin-bottom: 4px; }
        .dock-item span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        #toast { position: fixed; top: 80px; right: 30px; background: #10b981; color: white; padding: 15px 25px; border-radius: 12px; font-weight: bold; transform: translateX(150%); transition: 0.4s; z-index: 3000; }
        #toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div class="background-anim"></div>

    <header class="top-bar">
        <div class="post-counter"><i class="fa-solid fa-image"></i> Criadas: <span id="post-count">0</span></div>
        <div class="clock-widget" id="clock">00:00:00</div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" class="search-bar" placeholder="🔍 Buscar links (Pura, Insta, ChatGPT)...">
    </div>

    <main class="main-content">
        <section id="slide-sociais" class="slide active">
            <div class="section-header"><h2>Redes Sociais</h2><p>Comunicação e Presença Digital</p></div>
            <div class="grid">
                <a href="https://wa.me/5521972653971" target="_blank" class="card link-item" data-search="whatsapp zap">
                    <div class="card-icon"><i class="fa-brands fa-whatsapp" style="color: #25D366;"></i></div>
                    <span class="title">WhatsApp</span>
                </a>
                <a href="https://www.instagram.com/alexandredamasceno.corretor" target="_blank" class="card link-item" data-search="instagram">
                    <div class="card-icon"><i class="fa-brands fa-instagram" style="color: #E1306C;"></i></div>
                    <span class="title">Instagram Prof.</span>
                </a>
                <a href="https://chatgpt.com/" target="_blank" class="card link-item" data-search="chatgpt ia">
                    <div class="card-icon"><i class="fa-solid fa-brain" style="color: #10b981;"></i></div>
                    <span class="title">ChatGPT</span>
                </a>
            </div>
        </section>

        <section id="slide-creator" class="slide">
            <div class="section-header"><h2>Estúdio</h2><p>Gere e descarregue na hora.</p></div>
            <div class="creator-grid">
                <div class="panel">
                    <input type="file" id="image-input" accept="image/*" onchange="window.processImage()">
                    <input type="text" id="p-title" placeholder="TÍTULO DO IMÓVEL" oninput="window.drawCanvas()">
                    <input type="text" id="p-price" placeholder="VALOR / DESTAQUE" oninput="window.drawCanvas()">
                    <textarea id="p-desc" rows="4" placeholder="Descrição detalhada..." oninput="window.drawCanvas()"></textarea>
                    <button class="btn-primary" id="btn-save" onclick="window.downloadAndSaveImage()">BAIXAR E SALVAR NA NUVEM</button>
                </div>
                <div class="panel">
                    <canvas id="preview-canvas" width="1080" height="1350"></canvas>
                </div>
            </div>
        </section>
    </main>

    <nav class="dock">
        <button class="dock-item active" onclick="window.switchSlide('slide-sociais', this)"><i class="fa-solid fa-users"></i><span>Links</span></button>
        <button class="dock-item" onclick="window.switchSlide('slide-creator', this)"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Estúdio</span></button>
    </nav>

    <div id="toast">Sucesso! Arte pronta.</div>

    <script>
        // SISTEMA VISUAL (Relógio e Navegação)
        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        window.switchSlide = (id, btn) => {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        };

        // MOTOR DO CANVAS
        window.baseImage = new Image();
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "#111827"; ctx.fillRect(0,0,1080,1350);

        window.processImage = () => {
            const reader = new FileReader();
            reader.onload = (e) => { window.baseImage.onload = window.drawCanvas; window.baseImage.src = e.target.result; };
            reader.readAsDataURL(document.getElementById('image-input').files[0]);
        };

        window.drawCanvas = () => {
            if(window.baseImage.src) ctx.drawImage(window.baseImage, 0, 0, 1080, 1350);
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 950, 1080, 400);
            ctx.fillStyle = "white"; ctx.font = "bold 60px Poppins"; ctx.fillText(document.getElementById('p-title').value.toUpperCase() || "TÍTULO", 60, 1050);
            ctx.fillStyle = "#e8c97a"; ctx.font = "50px Poppins"; ctx.fillText(document.getElementById('p-price').value || "VALOR", 60, 1130);
            ctx.fillStyle = "white"; ctx.font = "bold 30px Poppins"; ctx.fillText("ALEXANDRE DAMASCENO | CRECI 106.899", 60, 1280);
        };

        window.downloadAndSaveImage = () => { alert("Conectando ao banco de dados..."); };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

        // CHAVES REAIS DO SEU PROJETO 'workspace-imobiliario'
        const firebaseConfig = {
            apiKey: "AIzaSyCrF0p0v9ofISUWPnD-K8nhzXH30ENjuA",
            authDomain: "workspace-imobiliario.firebaseapp.com",
            projectId: "workspace-imobiliario",
            storageBucket: "workspace-imobiliario.firebasestorage.app",
            messagingSenderId: "46767058778",
            appId: "1:46767058778:web:1522f9bc512320ce498d63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.downloadAndSaveImage = async () => {
            const btn = document.getElementById('btn-save');
            btn.disabled = true; btn.innerText = "A SALVAR...";

            try {
                // 1. BAIXAR NA HORA
                const link = document.createElement('a');
                link.download = "imovel-arte.png";
                link.href = canvas.toDataURL();
                link.click();

                // 2. SALVAR NA NUVEM
                const blob = await new Promise(res => canvas.toBlob(res));
                const fileRef = ref(storage, `artes/imovel_${Date.now()}.png`);
                await uploadBytes(fileRef, blob);
                const url = await getDownloadURL(fileRef);

                await addDoc(collection(db, "historico_artes"), {
                    titulo: document.getElementById('p-title').value,
                    imagemUrl: url,
                    data: serverTimestamp()
                });

                document.getElementById('toast').classList.add('show');
                setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
            } catch (e) { console.error(e); alert("Erro ao salvar na nuvem, mas a foto foi baixada."); }
            
            btn.disabled = false; btn.innerText = "BAIXAR ARTE E SALVAR NA NUVEM";
        };
    </script>
</body>
</html>
